<!DOCTYPE html>
<html>
    <head>
        <title>Student Management System</title>
    </head>
    <body>
        <h1>Welcome to the Student Management System</h1>
        <p>This is my decode labs project 3</p>
        <a href="/about">Go to About Page</a>
        <h2>Student List</h2>
        <table border="1">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Action</th>
            </tr>

            {% for student in students %}

            <tr>
                <td>{{ student[0] }}</td>
                <td>{{ student[1] }}</td>
                <td>{{ student[2] }}</td>

                <td>
                    <a href="/edit/{{student[0]}}">Edit</a>
                    <a href="/delete/{{student[0]}}">Delete</a>
                </td>
            </tr>

            {% endfor %}
        </table>
    </body>
</html>
